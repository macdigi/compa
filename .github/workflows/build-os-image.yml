name: Build Compa OS image

# Build the bootable Compa OS .img.xz directly via pi-gen and publish
# it to the compa-os-downloads B2 bucket + a GitHub Release.
#
# Trigger manually from the Actions tab (Run workflow), OR push a
# git tag like `v1.0` and the build kicks off automatically.
#
# Requires two repo secrets (Settings → Secrets and variables →
# Actions):
#   B2_KEY_ID   — Backblaze B2 application key ID
#   B2_APP_KEY  — Backblaze B2 application key

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for this build (e.g. 1.0.0). Used in the filename.'
        required: true
        default: 'dev'

# softprops/action-gh-release needs contents:write to create the
# release. Default GITHUB_TOKEN scope is read-only on tag pushes,
# so without this the build succeeds but the release step 403s.
permissions:
  contents: write

jobs:
  build:
    # Native arm64 runner — pi-gen's chroot runs without QEMU
    # translation, ~2x faster than emulating on an x86 host. Costs
    # ~$0.005/min for private repos (~$0.15 per 30-min build).
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: compa-src
          # CRITICAL: do NOT persist the job's GITHUB_TOKEN into
          # compa-src/.git/config. That .git is rsync'd verbatim into
          # the shipped OS image; with persist-credentials on, every
          # image leaks a short-lived `http.extraheader` token and,
          # once it expires, on-device `git fetch` 401s so the in-app
          # updater can never reach origin. Keep this false.
          persist-credentials: false

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version || 'dev' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve download base URL
        id: download_base
        run: |
          BASE_URL='${{ vars.COMPA_OS_DOWNLOAD_BASE_URL }}'
          if [[ -z "$BASE_URL" ]]; then
            BASE_URL='https://f004.backblazeb2.com/file/compa-os-downloads'
          fi
          BASE_URL="${BASE_URL%/}"
          echo "url=${BASE_URL}" >> "$GITHUB_OUTPUT"

      - name: Free runner disk space
        # Default GitHub runner has ~14 GB free; pi-gen wants 25-30 GB.
        # Strip out toolchains and SDKs we won't touch during this run.
        run: |
          df -h /
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          sudo apt-get clean
          df -h /

      - name: Install pi-gen build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            quilt parted coreutils \
            debootstrap zerofree zip dosfstools e2fsprogs libcap2-bin \
            libarchive-tools grep rsync xz-utils curl xxd file git \
            kmod bc gpg pigz arch-test \
            >/dev/null

      - name: Clone pi-gen (arm64 branch)
        run: |
          git clone --depth 1 -b arm64 \
            https://github.com/RPi-Distro/pi-gen.git pi-gen

      - name: Trim unwanted stages (we only want Pi OS Lite + Compa)
        run: |
          rm -rf pi-gen/stage3 pi-gen/stage4 pi-gen/stage5
          # Don't let stage2 export an image — only our final stage
          rm -f pi-gen/stage2/EXPORT_IMAGE pi-gen/stage2/EXPORT_NOOBS

      - name: Stage Compa layer
        # 00-run.sh references ${BASE_DIR}/setup/install.sh (and the
        # udev rule) — BASE_DIR is /pi-gen inside pi-gen's chroot.
        # Mirror the source setup/ layout so those paths resolve, and
        # stage a source snapshot so the image build never has to clone
        # the private repo from inside the chroot.
        run: |
          mkdir -p pi-gen/setup
          cp compa-src/setup/install.sh pi-gen/setup/install.sh
          cp compa-src/setup/50-ableton-push-2.rules \
             pi-gen/setup/50-ableton-push-2.rules

          # Normalize the .git that ships inside the image so the in-app
          # updater works on first boot. A tag-push checkout leaves git
          # in detached HEAD with a tag-only fetch refspec; left as-is,
          # the on-device updater can't resolve origin/<branch>. Attach
          # HEAD to main, point origin at the public repo, restore the
          # standard fetch refspec, and strip any leftover CI auth
          # header. (persist-credentials:false already prevents the
          # token, but unset defensively.)
          git -C compa-src config --unset-all \
            'http.https://github.com/.extraheader' 2>/dev/null || true
          git -C compa-src remote set-url origin \
            https://github.com/macdigi/compa.git
          git -C compa-src config remote.origin.fetch \
            '+refs/heads/*:refs/remotes/origin/*'
          git -C compa-src branch -f main HEAD
          git -C compa-src symbolic-ref HEAD refs/heads/main
          git -C compa-src config branch.main.remote origin
          git -C compa-src config branch.main.merge refs/heads/main
          echo "── staged .git state ──"
          git -C compa-src status -sb | head -1
          git -C compa-src remote -v

          # .github IS shipped (it's tiny) so the image's working tree
          # matches HEAD exactly — a phantom "deleted .github" would
          # make `git status` dirty and can block `git pull --ff-only`.
          rsync -a --delete \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.DS_Store' \
            --exclude 'cloudflare-worker/node_modules' \
            compa-src/ pi-gen/setup/compa-src/
          cp -r compa-src/setup/pi-gen-stage pi-gen/stage-compa
          chmod +x pi-gen/setup/install.sh \
                   pi-gen/stage-compa/prerun.sh \
                   pi-gen/stage-compa/00-compa/00-run.sh
          ls -la pi-gen/setup/ pi-gen/stage-compa/

      - name: Write pi-gen config
        run: |
          cat > pi-gen/config <<EOF
          IMG_NAME=compa-os-${{ steps.ver.outputs.version }}
          DEPLOY_COMPRESSION=xz
          COMPRESSION_LEVEL=6
          LOCALE_DEFAULT=en_US.UTF-8
          TARGET_HOSTNAME=compa
          KEYBOARD_KEYMAP=us
          KEYBOARD_LAYOUT="English (US)"
          TIMEZONE_DEFAULT=Etc/UTC
          FIRST_USER_NAME=pi
          FIRST_USER_PASS=compa
          DISABLE_FIRST_BOOT_USER_RENAME=1
          ENABLE_SSH=1
          STAGE_LIST="stage0 stage1 stage2 stage-compa"
          PI_GEN=pi-gen
          PI_GEN_RELEASE="Compa OS"
          EOF
          echo '── config ──'
          cat pi-gen/config

      - name: Build with pi-gen
        run: |
          cd pi-gen
          sudo ./build-docker.sh

      - name: Find image artifact
        id: artifact
        run: |
          # pi-gen runs in docker as root, so deploy/ artifacts are
          # root-owned. Reclaim ownership before mv/sha256sum/etc.
          sudo chown -R $USER:$USER pi-gen/deploy
          IMG=$(find pi-gen/deploy -name '*.img.xz' | head -1)
          if [[ -z "$IMG" ]]; then
            echo "No image produced. Contents of pi-gen/deploy:"
            ls -la pi-gen/deploy/ || true
            exit 1
          fi
          FRIENDLY="compa-os-${{ steps.ver.outputs.version }}.img.xz"
          mv "$IMG" "./${FRIENDLY}"
          sha256sum "./${FRIENDLY}" > "./${FRIENDLY}.sha256"
          ls -lh "./${FRIENDLY}" "./${FRIENDLY}.sha256"
          echo "filename=${FRIENDLY}" >> "$GITHUB_OUTPUT"
          echo "sha256_filename=${FRIENDLY}.sha256" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # Build the User Manual PDF and ship it to B2 alongside the image,
      # so the download email can link a stable B2 URL instead of
      # attaching the file. Script: compa-src/docs/build_pdf.py; assets
      # (screenshots + logos) read from compa-src/docs/.
      # ------------------------------------------------------------------
      - name: Set up Python (for PDF build)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PDF build dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet 'reportlab>=4.0' 'Pillow>=10.0'

      - name: Build User Manual PDF
        id: pdf
        run: |
          UNVERSIONED="Compa_User_Manual.pdf"
          VERSIONED="Compa_User_Manual_${{ steps.ver.outputs.version }}.pdf"
          python compa-src/docs/build_pdf.py \
            --version "${{ steps.ver.outputs.version }}" \
            --output "./${UNVERSIONED}"
          cp "./${UNVERSIONED}" "./${VERSIONED}"
          ls -lh ./Compa_User_Manual*.pdf
          echo "unversioned=${UNVERSIONED}" >> "$GITHUB_OUTPUT"
          echo "versioned=${VERSIONED}" >> "$GITHUB_OUTPUT"

      - name: Upload to Backblaze B2 (S3-compatible API)
        # The native B2 CLI's `b2 account authorize` implicitly calls
        # listBuckets — which our bucket-scoped application key
        # explicitly cannot do. B2's S3-compatible API authenticates
        # per-request with no list-style preflight, so it works fine
        # with a key restricted to a single bucket. The public download
        # URL stays at f004.backblazeb2.com/file/<bucket>/<key>.
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.B2_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APP_KEY }}
          AWS_DEFAULT_REGION:    us-west-004
          B2_BUCKET:             compa-os-downloads
          B2_ENDPOINT:           https://s3.us-west-004.backblazeb2.com
        run: |
          if [[ -z "${AWS_ACCESS_KEY_ID}" || -z "${AWS_SECRET_ACCESS_KEY}" ]]; then
            echo "::error::B2_KEY_ID / B2_APP_KEY secrets are not configured."
            exit 1
          fi
          IMG="${{ steps.artifact.outputs.filename }}"
          SHA="${{ steps.artifact.outputs.sha256_filename }}"

          aws --endpoint-url "${B2_ENDPOINT}" s3 cp \
            "${IMG}" "s3://${B2_BUCKET}/${IMG}"
          aws --endpoint-url "${B2_ENDPOINT}" s3 cp \
            "${SHA}" "s3://${B2_BUCKET}/${SHA}"

          # Always-current copies under the "latest" name.
          aws --endpoint-url "${B2_ENDPOINT}" s3 cp \
            "${IMG}" "s3://${B2_BUCKET}/compa-os-latest.img.xz"
          aws --endpoint-url "${B2_ENDPOINT}" s3 cp \
            "${SHA}" "s3://${B2_BUCKET}/compa-os-latest.img.xz.sha256"

          # User manual: a stable "Compa_User_Manual.pdf" the download
          # email links to, plus a versioned archive copy. The stable
          # name always serves the newest build.
          MANUAL="${{ steps.pdf.outputs.unversioned }}"
          MANUAL_VER="${{ steps.pdf.outputs.versioned }}"
          aws --endpoint-url "${B2_ENDPOINT}" s3 cp \
            "${MANUAL}" "s3://${B2_BUCKET}/${MANUAL}" \
            --content-type application/pdf
          aws --endpoint-url "${B2_ENDPOINT}" s3 cp \
            "${MANUAL_VER}" "s3://${B2_BUCKET}/${MANUAL_VER}" \
            --content-type application/pdf

      - name: Create GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Compa ${{ steps.ver.outputs.version }}
          body: |
            ## Compa OS image

            **Download:** [compa-os-${{ steps.ver.outputs.version }}.img.xz](${{ steps.download_base.outputs.url }}/compa-os-${{ steps.ver.outputs.version }}.img.xz)

            **SHA-256:** [checksum file](${{ steps.download_base.outputs.url }}/compa-os-${{ steps.ver.outputs.version }}.img.xz.sha256)

            ## User Manual

            **Download:** [${{ steps.pdf.outputs.versioned }}](${{ steps.download_base.outputs.url }}/${{ steps.pdf.outputs.versioned }})

            Always-current link: `${{ steps.download_base.outputs.url }}/Compa_User_Manual.pdf`

            ### Install
            1. Download the `.img.xz` file above.
            2. Open Raspberry Pi Imager → Choose OS → "Use custom" → select the file.
            3. Choose your SD card → Write.
            4. Insert SD card into your Pi, plug in your sampler, power on.

            See the [Quick Start in the README](https://github.com/macdigi/compa#install) for full details.
          draft: false
          prerelease: false
